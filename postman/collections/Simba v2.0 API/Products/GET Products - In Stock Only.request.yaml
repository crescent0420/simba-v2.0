$kind: http-request
url: "{{baseURL}}/api/products?inStock=true"
method: GET
queryParams:
  inStock: "true"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("All returned products are in stock", function () {
          const json = pm.response.json();
          json.products.forEach(p => {
              pm.expect(p.inStock).to.be.true;
          });
      });
    language: text/javascript
order: 4000
