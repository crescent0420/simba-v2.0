$kind: http-request
url: "{{baseURL}}/api/products"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Response has products array", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property('products').that.is.an('array');
      });
      pm.test("Response has total count", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property('total').that.is.a('number');
      });
      pm.test("Total matches products array length", function () {
          const json = pm.response.json();
          pm.expect(json.total).to.eql(json.products.length);
      });
      pm.test("Response time is under 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
    language: text/javascript
order: 1000
