$kind: http-request
url: "{{baseURL}}/api/checkout/momo"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "phone": "0781234567",
      "pin": "12",
      "amount": 400
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 400", function () {
          pm.response.to.have.status(400);
      });
      pm.test("Error message mentions PIN", function () {
          const json = pm.response.json();
          pm.expect(json.error).to.include('PIN');
      });
    language: text/javascript
order: 3000
