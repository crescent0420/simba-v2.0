$kind: http-request
url: "{{baseURL}}/api/checkout/momo"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "phone": "0781234567",
      "pin": "1234",
      "amount": 400
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Response has success true", function () {
          const json = pm.response.json();
          pm.expect(json.success).to.be.true;
      });
      pm.test("Response has transactionId", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property('transactionId').that.is.a('string');
      });
      pm.test("TransactionId is 8 hex characters", function () {
          const json = pm.response.json();
          pm.expect(json.transactionId).to.match(/^[0-9a-f]{8}$/);
      });
    language: text/javascript
order: 1000
